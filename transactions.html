<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Movimientos</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <style>
        :root{
            --app-primary: #7c4dff;
            --app-primary-600: #6b3cff;
            --app-accent: #9b6bff;
            --muted: #6b7280;
            --bg: #f4f6f9;
        }
        body { background: linear-gradient(180deg, #f7f9fc 0%, var(--bg) 100%); color: #222; }
        .container { max-width: 900px; }
        h2 { color: var(--app-primary); font-weight:700; margin-bottom: 8px; }
        .list-group { padding-top: 8px; }
        #txList .list-group-item { border: none; background: transparent; padding: 12px 0; }
        .badge-secondary { background: var(--app-primary-600); color: #fff; }
        .text-muted { color: var(--muted) !important; }
        #txDetails .card { border: 1px solid rgba(107,60,255,0.08); box-shadow: 0 8px 24px rgba(107,60,255,0.06); }
        a.btn-link { color: var(--app-primary-600); }
        a.btn-link:hover { color: var(--app-primary); text-decoration: none; }
        /* Botón Volver al Menú estilo sendmoney */
        #btnVolverMenu { background: transparent; color: var(--app-primary-600); border: 1px solid var(--app-primary-600); padding: .35rem .7rem; border-radius: .25rem; text-decoration:none; }
        #btnVolverMenu:hover { background: var(--app-primary-600); color: #fff; }
    </style>
</head>
<body>

    <div class="container mt-5">
        <h2>Últimos Movimientos</h2>
        <p class="text-muted">Historial de movimientos guardados en localStorage</p>
        <hr>

        <!-- Filtro por tipo: permite al usuario seleccionar qué tipos mostrar -->
        <div class="form-group mb-3">
            <label for="filterType" class="mr-2">Filtrar por tipo:</label>
            <select id="filterType" class="form-control d-inline-block" style="width:auto;">
                <option value="all">Todos</option>
                <option value="deposito">Depósito</option>
                <option value="transferencia">Transferencia</option>
            </select>
        </div>

        <!-- Contenedor donde se renderizará la lista de movimientos dinámicamente -->
        <ul id="txList" class="list-group mb-4"></ul>

        <!-- Panel que muestra los detalles de la última operación -->
        <div id="txDetails" class="card mb-4" style="display:none;">
            <div class="card-body">
                <h5 class="card-title">Detalles de la última operación</h5>
                <p id="detalleTipo"></p>
                <p id="detalleMonto"></p>
                <p id="detalleFecha"></p>
                <p id="detalleExtra"></p>
            </div>
        </div>

        <a id="btnVolverMenu" class="btn btn-sm ml-2" href="menu.html">Volver al Menú</a>
    </div>
    </n>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script>
            // ----------------------------
            // CARGA DE TRANSACCIONES
            // ----------------------------
            // Obtener array de transacciones desde localStorage bajo la clave 'walletTransactions'.
            // Si no existe, usamos un array vacío (se inicializa más abajo con ejemplos).
            var transactions = JSON.parse(localStorage.getItem('walletTransactions') || '[]');

            // Si no existen transacciones guardadas, inicializamos con ejemplos de demostración
            // Esto facilita ver la interfaz sin depender de operaciones previas.
            if (!transactions || transactions.length === 0) {
                transactions = [
                    {
                        tipo: 'Depósito', // tipo de operación
                        descripcion: 'Depósito Inicial', // breve descripción
                        monto: 5000, // monto numérico
                        fecha: '15/05/2026', // fecha mostrada (puede ser timestamp real)
                        positivo: true // indicador si es ingreso o egreso
                    },
                    {
                        tipo: 'Transferencia',
                        descripcion: 'Transferencia a Juan Pérez',
                        monto: 1500,
                        fecha: '16/05/2026',
                        positivo: false,
                        destino: { nombre: 'Juan Pérez' } // información extra opcional
                    }
                ];
                // Guardar los ejemplos en localStorage para que persistan mientras se prueba la UI
                localStorage.setItem('walletTransactions', JSON.stringify(transactions));
            }

            // ----------------------------
            // RENDERIZADO DE LA LISTA (CON FILTRO)
            // ----------------------------
            // Esta función recorre el array de transacciones y crea elementos <li>
            // para cada movimiento, aplicando estilo según sea positivo o negativo.
            // Además acepta un filtro opcional para mostrar solo ciertos tipos.
            function mostrarUltimosMovimientos(filtro) {
                var $list = $('#txList');
                $list.empty();

                // Hacemos una copia invertida para mostrar primero lo más reciente
                var txCopy = transactions.slice().reverse();

                // Normalizar filtro
                var f = (filtro || 'all').toString().toLowerCase();

                txCopy.forEach(function(tx) {
                        // Obtener tipo legible y normalizado usando helper
                        var tipoLegible = getTipoTransaccion(tx.tipo);
                        var tipoLower = (tipoLegible || '').toString().toLowerCase();

                        var mostrar = true;
                        if (f === 'deposito') {
                            // Mostrar sólo transacciones identificadas como 'depósito'
                            mostrar = tipoLower.indexOf('dep') !== -1;
                        } else if (f === 'transferencia') {
                            // Mostrar transacciones identificadas como 'transferencia'
                            mostrar = tipoLower.indexOf('transferencia') !== -1;
                        }

                    if (!mostrar) return; // skip

                    var amountClass = tx.positivo ? 'text-success' : 'text-danger';
                    var signo = tx.positivo ? '+' : '-';

                    var $li = $('<li class="list-group-item"></li>');
                    // Construir título/descripcion: usar tx.descripcion si existe,
                    // si no, crear a partir del tipo y del destino (mostrar nombre si está disponible)
                    var titulo = '';
                    var descRaw = (tx.descripcion || '').toString();
                    var aliasOrName = getDisplayName(tx) || '';
                    // Si hay descripción explícita, respetarla salvo que sea genérica 'Transferencia' o termine en 'Transferencia a '
                    if (descRaw.trim() !== '') {
                        if ((/transferencia\s+a\s*$/i.test(descRaw) || /^transferencia\s*$/i.test(descRaw)) && aliasOrName) {
                            // Mostrar como 'Transferido a <aliasOrName>' preferiendo el alias
                            titulo = 'Transferido a ' + escapeHtml(aliasOrName);
                        } else {
                            titulo = escapeHtml(descRaw);
                        }
                    } else {
                        if (tipoLower.indexOf('transfer') !== -1) {
                            // Para transferencias sin descripción, mostrar 'Transferido a <alias>' cuando haya alias
                            titulo = aliasOrName ? ('Transferido a ' + escapeHtml(aliasOrName)) : 'Transferencia';
                        } else {
                            titulo = escapeHtml(tipoLegible);
                        }
                    }
                    $li.append('<h5>' + titulo + ' <span class="badge badge-secondary ml-2">' + escapeHtml(tipoLegible) + '</span></h5>');
                    // Monto con color dependiendo si entra o sale dinero. Mostrar con dos decimales.
                    var montoFormateado = Number(tx.monto || 0).toFixed(2);
                    $li.append('<p class="' + amountClass + ' mb-1">' + signo + '$' + montoFormateado + '</p>');
                    // Fecha (si no hay, se usa la fecha local actual)
                    $li.append('<small>' + escapeHtml(tx.fecha || new Date().toLocaleString()) + '</small>');

                    // Información extra opcional: destinatario, alias, CBU, banco
                    if (tx.destino || tx.alias || tx.cbu || tx.banco) {
                        var extra = '<div class="mt-2"><small>';
                        if (tx.destino && tx.destino.nombre) extra += 'Destinatario: ' + escapeHtml(tx.destino.nombre) + ' | ';
                        if (tx.alias) extra += 'Alias: ' + escapeHtml(tx.alias) + ' | ';
                        if (tx.cbu) extra += 'CBU: ' + escapeHtml(tx.cbu) + ' | ';
                        if (tx.banco) extra += 'Banco: ' + escapeHtml(tx.banco) + ' | ';
                        extra = extra.replace(/ \| $/, ''); // eliminar barra final si existe
                        extra += '</small></div>';
                        $li.append(extra);
                    }

                    $list.append($li);
                });
            }

            // Helper para escapar HTML al renderizar datos del usuario (previene inyección simples)
            function escapeHtml(text) {
                return String(text || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            /**
             * Devuelve el tipo de transacción en un formato legible y consistente.
             * Acepta distintas variantes (mayúsculas/minúsculas) y normaliza a etiquetas conocidas.
             * @param {string} tipo Valor original del campo `tipo` de la transacción
             * @returns {string} Tipo legible (por ejemplo 'Depósito', 'Transferencia')
             */
            function getTipoTransaccion(tipo) {
                var t = (tipo || '').toString().trim().toLowerCase();
                if (!t) return 'Desconocido';
                if (t.indexOf('dep') !== -1) return 'Depósito';
                if (t.indexOf('transfer') !== -1) return 'Transferencia';
                // Si no coincide con ningún patrón conocido, capitalizamos la primera letra
                return tipo.charAt(0).toUpperCase() + tipo.slice(1);
            }

            // Helper: devuelve un nombre legible para mostrar como destino/alias/CBU.
            // Prioriza `alias`, luego `destino.nombre` o `destino.name`, luego cualquier string dentro de `destino`, luego `cbu`.
            function getDisplayName(tx) {
                if (!tx) return '';
                if (tx.alias && tx.alias.toString().trim() !== '') return tx.alias.toString().trim();
                // destino puede ser string o objeto
                if (tx.destino) {
                    if (typeof tx.destino === 'string' && tx.destino.trim() !== '') return tx.destino.trim();
                    if (typeof tx.destino === 'object') {
                        if (tx.destino.nombre && tx.destino.nombre.toString().trim() !== '') return tx.destino.nombre.toString().trim();
                        if (tx.destino.name && tx.destino.name.toString().trim() !== '') return tx.destino.name.toString().trim();
                        // buscar primera propiedad que sea string y no vacía
                        for (var k in tx.destino) {
                            if (!tx.destino.hasOwnProperty(k)) continue;
                            var v = tx.destino[k];
                            if (typeof v === 'string' && v.trim() !== '') return v.trim();
                        }
                    }
                }
                if (tx.cbu && tx.cbu.toString().trim() !== '') return tx.cbu.toString().trim();
                return '';
            }

            // Normalizar los tipos en las transacciones existentes, eliminar entradas
            // cuya normalización resulte en 'Compra' y guardar de vuelta.
            if (transactions && transactions.length > 0) {
                var changed = false;
                // Primero normalizamos y construimos una nueva lista excluyendo 'Compra'
                var nuevas = [];
                transactions.forEach(function(t) {
                    var tipoNormal = getTipoTransaccion(t.tipo);
                    // Si la entrada corresponde a 'Compra', la omitimos (eliminamos)
                    if (tipoNormal.toLowerCase() === 'compra') {
                        changed = true; // marcamos cambio por eliminación
                        return; // skip this entry
                    }
                    // Actualizar el campo tipo si fue modificado por la normalización
                    if (t.tipo !== tipoNormal) {
                        t.tipo = tipoNormal;
                        changed = true;
                    }
                    nuevas.push(t);
                });
                if (changed) {
                    transactions = nuevas;
                    localStorage.setItem('walletTransactions', JSON.stringify(transactions));
                }
            }

            // ----------------------------
            // NORMALIZAR DESCRIPCIONES DE TRANSFERENCIAS
            // Completa descripciones vacías o genéricas ('Transferencia' o 'Transferencia a')
            // usando `alias`, `destino.nombre` o `cbu` si están disponibles.
            function normalizeTransferDescriptions() {
                var saved = false;
                transactions.forEach(function(tx) {
                    var tipo = getTipoTransaccion(tx.tipo).toString().toLowerCase();
                    if (tipo.indexOf('transfer') === -1) return;

                    var desc = (tx.descripcion || '').toString().trim();
                    var aliasOrName = getDisplayName(tx) || '';

                    if (!desc || /^transferencia\s*$/i.test(desc) || /transferencia\s+a\s*$/i.test(desc)) {
                        if (aliasOrName) {
                            tx.descripcion = 'Transferido a ' + aliasOrName;
                        } else {
                            tx.descripcion = 'Transferencia';
                        }
                        saved = true;
                    }
                });
                if (saved) localStorage.setItem('walletTransactions', JSON.stringify(transactions));
            }

            // Ejecutar normalización de descripciones antes de renderizar
            normalizeTransferDescriptions();

            // ----------------------------
            // MOSTRAR DETALLES DE LA ÚLTIMA OPERACIÓN
            // ----------------------------
            // Esta función toma la última transacción (la última del array en orden cronológico)
            // y la muestra en un panel con campos separados para facilitar la lectura.
            function showLastTransactionDetails() {
                if (!transactions || transactions.length === 0) {
                    $('#txDetails').hide();
                    return;
                }

                // La última transacción es la que fue añadida más recientemente al array
                var last = transactions[transactions.length - 1];

                // Mostrar el tipo utilizando el helper para formato legible
                $('#detalleTipo').text('Tipo: ' + getTipoTransaccion(last.tipo || ''));
                $('#detalleMonto').text('Monto: ' + (last.positivo ? '+' : '-') + '$' + last.monto);
                $('#detalleFecha').text('Fecha: ' + (last.fecha || new Date().toLocaleString()));

                // Recolectar y mostrar cualquier información extra disponible
                var extras = [];
                if (last.destino && last.destino.nombre) extras.push('Destinatario: ' + last.destino.nombre);
                if (last.alias) extras.push('Alias: ' + last.alias);
                if (last.cbu) extras.push('CBU: ' + last.cbu);
                if (last.banco) extras.push('Banco: ' + last.banco);

                $('#detalleExtra').text(extras.join(' | '));
                $('#txDetails').show();
            }

            // ----------------------------
            // INICIALIZACIÓN
            // ----------------------------
            // Renderizamos la lista y el panel de detalles al cargar la página
            mostrarUltimosMovimientos();
            showLastTransactionDetails();

            // Manejar cambio del filtro por tipo para renderizar dinámicamente
            $('#filterType').change(function() {
                var val = $(this).val();
                mostrarUltimosMovimientos(val);
            });

            // ----------------------------
            // NOTA PARA INTEGRACIÓN
            // ----------------------------
            // Otras páginas (por ejemplo, `deposit.html` o `sendmoney.html`) pueden añadir
            // transacciones al array guardado en 'walletTransactions' usando este patrón:
            //
            // var txs = JSON.parse(localStorage.getItem('walletTransactions') || '[]');
            // txs.push(nuevaTransaccionObject);
            // localStorage.setItem('walletTransactions', JSON.stringify(txs));
            //
            // Después de añadir una transacción, recargar esta página actualizará la lista.
        </script>
</body>
</html>
