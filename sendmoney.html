<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Enviar Dinero</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <style>
        :root{
            --app-primary: #7c4dff; /* morado principal */
            --app-primary-600: #6b3cff;
            --app-accent: #9b6bff; /* acento morado claro */
            --muted: #6b7280;
            --bg: #f4f6f9;
        }
        /* Estilo general inspirado en diseño tipo Figma para wallet */
        body { background: linear-gradient(180deg, #f7f9fc 0%, var(--bg) 100%); color: #222; }
        .container { max-width: 900px; }
        h2 { color: var(--app-primary); font-weight:700; margin-bottom: 8px; }
        .list-group { padding-top: 8px; }
        .list-group .list-group-item { border: none; background: transparent; padding: 0 0 14px 0; }
        .contact-info { background: linear-gradient(90deg, var(--app-primary), var(--app-primary-600)); color: #fff; padding: 14px 16px; border-radius: 10px; display:flex; align-items:center; justify-content:space-between; }
        .contact-info strong { font-size:1.05rem; }
        .contact-meta { color: rgba(255,255,255,0.9); font-size:0.9rem; }
        .contact-actions { margin-top:10px; display:flex; gap:8px; justify-content:flex-end; align-items:center; }
        /* Botón seleccionar: colores morados para buena visibilidad sobre fondo claro */
        .btn-seleccionar {
            background: transparent;
            color: var(--app-primary-600) !important;
            border: 1px solid var(--app-primary-600) !important;
            padding: .375rem .6rem;
            border-radius: 8px;
            font-weight: 600;
            box-shadow: none;
            opacity: 1;
        }
        .btn-seleccionar:hover {
            background: var(--app-primary-600) !important;
            color: #fff !important;
            border-color: var(--app-primary-600) !important;
        }
        .btn-enviar { background: var(--app-accent); border-color: var(--app-accent); color: #fff; }
        .btn-enviar:hover { background: #7a3cff; }
        /* Estilo para el botón Agregar contacto en header */
        #btnAgregarContacto { background: var(--app-primary); border-color: var(--app-primary); color: #fff; }
        #btnAgregarContacto:hover { background: var(--app-primary-600); border-color: var(--app-primary-600); }
        /* Inputs y search */
        .form-inline .form-control { min-width: 260px; }
        /* Botón Buscar con color principal */
        #btnBuscar { background: var(--app-primary); border-color: var(--app-primary); color: #fff; }
        #btnBuscar:hover { background: var(--app-primary-600); border-color: var(--app-primary-600); }
        /* Botón Limpiar styled morado (outline por defecto, relleno al hover) */
        #btnLimpiarBusqueda { background: transparent; color: var(--app-primary-600); border: 1px solid var(--app-primary-600); }
        #btnLimpiarBusqueda:hover { background: var(--app-primary-600); color: #fff; }
        /* Badge para alias */
        .alias-badge { background: rgba(255,255,255,0.12); color: #fff; padding: 4px 8px; border-radius: 999px; font-size:0.85rem; margin-left:10px; }
        /* Modal styling */
        #sendModal, #contactModal { display: none; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.45); z-index:2000; }
        .modal-box { background: #fff; max-width: 520px; margin: 8% auto; padding: 20px; border-radius: 12px; box-shadow: 0 12px 40px rgba(124,77,255,0.12); position: relative; z-index:2001; }
        .modal-box h5 { margin-top: 0; font-weight: 700; color: var(--app-primary); }
        .modal-box p { margin-bottom: 12px; }
        .modal-actions .btn { min-width: 96px; }
        /* Saldo */
        #saldoActual { font-size: 1.05rem; color: var(--app-primary); }
        /* Botones 'Volver al Menú' morados (header y footer) */
        #btnVolverMenu, #btnVolverMenuBottom { background: transparent; color: var(--app-primary-600); border: 1px solid var(--app-primary-600); padding: .35rem .7rem; border-radius: .25rem; text-decoration:none; }
        #btnVolverMenu:hover, #btnVolverMenuBottom:hover { background: var(--app-primary-600); color: #fff; }
        /* Small responsive tweaks */
        @media (max-width:576px){ .form-inline { display:block; } .form-inline .form-control{ width:100%; margin-bottom:8px; } }
    </style>
</head>
<body>

    <div class="container mt-5">
        <h2>Enviar Dinero a Contactos</h2>
        <hr>

        <!-- Formulario de búsqueda: permite buscar por nombre o alias -->
        <form id="formBusqueda" class="form-inline mb-3">
            <input type="text" id="searchTerm" class="form-control mr-2" placeholder="Buscar por nombre o alias">
            <button type="submit" id="btnBuscar" class="btn btn-primary mr-2">Buscar</button>
            <button type="button" id="btnLimpiarBusqueda" class="btn btn-secondary">Limpiar</button>
            <!-- Mostrar saldo actual al lado del botón Limpiar -->
            <div class="ml-3 align-self-center">
                Saldo: <strong id="saldoActual">$0.00</strong>
            </div>
            <!-- Botón para agregar contacto (ahora dentro del header para mayor visibilidad) -->
            <button type="button" id="btnAgregarContacto" class="btn btn-sm ml-3" onclick="$('#contactModal').show(); $('#contactNombre').focus();">Agregar nuevo contacto</button>
            <a id="btnVolverMenu" class="btn btn-sm ml-2" href="menu.html">Volver al Menú</a>
        </form>

        <ul class="list-group mb-4">
            <li class="list-group-item">
                <div class="contact-info"><strong>Juan Pérez</strong> - Banco Estado</div>
                <button class="btn btn-sm btn-secondary mt-2 btn-seleccionar mr-2">Seleccionar</button>
                <button class="btn btn-sm btn-success mt-2 btn-enviar d-none">Enviar dinero</button>
            </li>
            <li class="list-group-item">
                <div class="contact-info"><strong>María González</strong> - Banco de Chile</div>
                <button class="btn btn-sm btn-secondary mt-2 btn-seleccionar mr-2">Seleccionar</button>
                <button class="btn btn-sm btn-success mt-2 btn-enviar d-none">Enviar dinero</button>
            </li>
        </ul>

        <!-- (El botón de agregar contacto se muestra ahora en el encabezado) -->

        <!-- Modal ligero para agregar nuevo contacto -->
        <div id="contactModal" style="display:none;">
            <div class="modal-overlay"></div>
            <div class="modal-box" style="max-width:500px;">
                <!-- Comentario: Formulario solicita Nombre y Apellido, Número de CBU, Alias y Nombre del Banco -->
                <h5>Agregar nuevo contacto</h5>
                <form id="formContacto">
                    <div class="form-group">
                        <label>Nombre y Apellido</label>
                        <input type="text" id="contactNombre" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Número de CBU</label>
                        <input type="text" id="contactCBU" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Alias</label>
                        <input type="text" id="contactAlias" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Nombre del Banco</label>
                        <input type="text" id="contactBanco" class="form-control" required>
                    </div>
                    <div class="text-right">
                        <button type="button" id="btnCerrarModal" class="btn btn-secondary">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Agregar</button>
                    </div>
                </form>
            </div>
        </div>


        <a id="btnVolverMenuBottom" class="btn btn-sm ml-2" href="menu.html">Volver al Menú</a>
    </div>

    <!-- Modal para ingresar el monto a enviar (reemplaza el uso de prompt) -->
    <div id="sendModal" style="display:none;">
        <div class="modal-overlay"></div>
        <div class="modal-box" style="max-width:420px;">
            <h5>Enviar dinero</h5>
            <!-- Formulario pequeño dentro del modal -->
            <form id="sendForm">
                <p>¿Cuánto dinero deseas enviar a <strong id="sendToName"></strong>?</p>
                <div class="form-group">
                    <label>Monto</label>
                    <input type="number" id="sendAmount" class="form-control" step="0.01" min="0" required>
                </div>
                <div class="text-right">
                    <button type="button" id="sendCancel" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Enviar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Alerta fija inferior para confirmar envíos exitosos -->
    <div id="bottomConfirm" class="alert alert-success alert-dismissible fixed-bottom m-3 d-none" role="alert" style="max-width:600px; margin-left:auto; margin-right:auto; left:0; right:0;">
        <span id="bottomConfirmText"></span>
        <button type="button" class="close" id="closeBottomConfirm" aria-label="Cerrar"><span aria-hidden="true">&times;</span></button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Cargar contactos desde localStorage y renderizarlos en la lista
        var contactos = JSON.parse(localStorage.getItem('walletContacts') || '[]');
        // Helper para normalizar el tipo de transacción antes de guardarlo
        function normalizeTipo(tipo) {
            var t = (tipo || '').toString().trim().toLowerCase();
            if (!t) return 'Desconocido';
            if (t.indexOf('dep') !== -1) return 'Depósito';
            if (t.indexOf('transfer') !== -1) return 'Transferencia';
            return tipo.charAt(0).toUpperCase() + tipo.slice(1);
        }
        // Último término de búsqueda aplicado (para mantener el estado tras agregar contactos)
        var ultimoFiltro = '';
        // Nombre del contacto seleccionado para enviar dinero (usado por el modal)
        var contactoSeleccionado = null;

        /**
         * Renderiza la lista de contactos en pantalla.
         * @param {string} filtro Texto para filtrar por nombre o alias (opcional).
         */
        function renderContactos(filtro) {
            // Normalizar filtro a minúsculas para comparaciones insensibles a mayúsculas
            var termino = (filtro || '').toString().trim().toLowerCase();

            var $lista = $('.list-group');
            $lista.empty();

            // Si no hay contactos guardados, renderizar algunos por defecto con alias de ejemplo
            if (contactos.length === 0) {
                contactos = [
                    {nombre: 'Juan Pérez', cbu: '', alias: 'juanp', banco: 'Banco Estado'},
                    {nombre: 'María González', cbu: '', alias: 'mariag', banco: 'Banco de Chile'}
                ];
            }

            // Contador de coincidencias para mostrar mensaje si no hay resultados
            var coincidencias = 0;

            contactos.forEach(function(c) {
                // Validar coincidencia: buscar en nombre y en alias (si existe)
                var nombreLower = (c.nombre || '').toLowerCase();
                var aliasLower = (c.alias || '').toLowerCase();

                var match = true;
                if (termino) {
                    match = nombreLower.indexOf(termino) !== -1 || aliasLower.indexOf(termino) !== -1;
                }

                    if (match) {
                        coincidencias++;
                        // Cada contacto tiene dos botones: uno para "Seleccionar" y otro (oculto) para "Enviar dinero".
                        var $li = $(
                            '<li class="list-group-item">' +
                                '<div class="contact-info"><div><strong>' + escapeHtml(c.nombre) + '</strong> - <span class="contact-meta">' + escapeHtml(c.banco || '') + '</span>' + (c.alias ? ' <span class="alias-badge">' + escapeHtml(c.alias) + '</span>' : '') + '</div></div>' +
                                '<div class="contact-actions"><button class="btn btn-sm btn-secondary mt-2 btn-seleccionar mr-2">Seleccionar</button>' +
                                '<button class="btn btn-sm btn-enviar mt-2 d-none">Enviar dinero</button></div>' +
                            '</li>'
                        );
                        $lista.append($li);
                    }
            });

            // Si no se encontraron coincidencias, mostrar mensaje informativo
            if (coincidencias === 0) {
                $lista.append('<li class="list-group-item text-muted">No se encontraron contactos que coincidan con la búsqueda.</li>');
            }
        }

        // Helper para escapar HTML al renderizar datos del usuario
        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // Render inicial sin filtro
        renderContactos();

        // Actualiza el elemento que muestra el saldo en la interfaz
        function updateSaldoDisplay() {
            var saldo = Number(localStorage.getItem('walletSaldo')) || 0;
            // Mostrar con dos decimales
            $('#saldoActual').text('$' + saldo.toFixed(2));
        }

        // Mostrar saldo inicial
        updateSaldoDisplay();

        // Manejador para enviar dinero (delegado, para funcionar con elementos añadidos dinámicamente)
        // Manejador para "Seleccionar": resalta el contacto y muestra el botón "Enviar dinero".
        $(document).on('click', '.btn-seleccionar', function() {
            var $li = $(this).closest('li');
            // Quitar selección previa y ocultar botones enviar en otros contactos
            $('.list-group .list-group-item').removeClass('active');
            $('.list-group .btn-enviar').addClass('d-none');

            // Resaltar el contacto seleccionado y mostrar su botón "Enviar dinero"
            $li.addClass('active');
            $li.find('.btn-enviar').removeClass('d-none');
        });

        // Manejador para enviar dinero: abre un modal en vez de usar prompt()
        $(document).on('click', '.btn-enviar', function() {
            // Obtener el nombre mostrado en la interfaz para el contacto seleccionado
            contactoSeleccionado = $(this).closest('li').find('.contact-info strong').text();
            // Mostrar el modal y actualizar el texto del destinatario
            $('#sendToName').text(contactoSeleccionado);
            $('#sendAmount').val('');
            $('#sendModal').show();
            $('#sendAmount').focus();
        });

        // Manejo del envío desde el modal: validar monto, actualizar saldo y registrar transacción
        $('#sendForm').submit(function(e) {
            e.preventDefault();

            // Lectura y normalización del monto ingresado
            var montoAEnviar = Number($('#sendAmount').val());
            var saldoActual = Number(localStorage.getItem('walletSaldo')) || 0;

            // Validaciones básicas del monto (comentadas en español)
            // - Debe ser número y mayor que cero
            if (isNaN(montoAEnviar) || montoAEnviar <= 0) {
                alert('Monto inválido. Por favor ingresa un número mayor que 0.');
                return;
            }

            // - No debe superar el saldo disponible
            if (montoAEnviar > saldoActual) {
                alert('Saldo insuficiente. Tienes: $' + saldoActual.toFixed(2));
                return;
            }

            // Actualizar saldo y guardarlo
            saldoActual = saldoActual - montoAEnviar;
            localStorage.setItem('walletSaldo', saldoActual);
            // Refrescar indicador de saldo en la UI
            updateSaldoDisplay();

            // Registrar la transacción en el historial 'walletTransactions'
            var contactObj = contactos.find(function(c) { return c.nombre === contactoSeleccionado; }) || null;
            var txs = JSON.parse(localStorage.getItem('walletTransactions') || '[]');
            var nuevaTx = {
                tipo: normalizeTipo('Transferencia'),
                descripcion: 'Transferencia a ' + contactoSeleccionado,
                monto: montoAEnviar,
                fecha: new Date().toLocaleString(),
                positivo: false,
                destino: contactObj ? { nombre: contactObj.nombre } : { nombre: contactoSeleccionado },
                alias: contactObj ? contactObj.alias : undefined,
                cbu: contactObj ? contactObj.cbu : undefined,
                banco: contactObj ? contactObj.banco : undefined
            };
            txs.push(nuevaTx);
            localStorage.setItem('walletTransactions', JSON.stringify(txs));

            // Cerrar modal, mostrar confirmación y redirigir al menú tras pausa
            $('#sendModal').hide();
            showBottomConfirmation('Transferencia exitosa a ' + contactoSeleccionado + ': $' + montoAEnviar.toFixed(2));
            setTimeout(function() {
                window.location.href = "menu.html";
            }, 2200);
        });

        // Botón cancelar del modal: cerrar y limpiar campos
        $('#sendCancel').click(function() {
            $('#sendModal').hide();
            $('#sendForm')[0].reset();
        });

        // Cerrar modal si se hace click en el fondo (overlay)
        $(document).on('click', '.modal-overlay', function() {
            $(this).parent().hide();
        });

        // Función para mostrar la alerta fija inferior (dismissible, auto-hide opcional)
        function showBottomConfirmation(mensaje) {
            $('#bottomConfirmText').text(mensaje);
            $('#bottomConfirm').removeClass('d-none');
            // Auto-hide tras 4 segundos si el usuario no cierra manualmente
            setTimeout(function() {
                $('#bottomConfirm').addClass('d-none');
            }, 4000);
        }

        // Cerrar la confirmación manualmente
        $(document).on('click', '#closeBottomConfirm', function() {
            $('#bottomConfirm').addClass('d-none');
        });

        // Mostrar el modal ligero al pulsar "Agregar nuevo contacto" (delegated binding + log)
        $(document).on('click', '#btnAgregarContacto', function() {
            console.log('btnAgregarContacto clicked');
            $('#contactModal').show();
        });

        // Cerrar modal al pulsar "Cancelar"
        $('#btnCerrarModal').click(function() {
            $('#contactModal').hide();
            $('#formContacto')[0].reset();
        });

        // Manejar envío del formulario de nuevo contacto
        $('#formContacto').submit(function(e) {
            e.preventDefault();

            // Obtener valores del formulario
            var nombre = $('#contactNombre').val().trim();
            var cbu = $('#contactCBU').val().trim();
            var alias = $('#contactAlias').val().trim();
            var banco = $('#contactBanco').val().trim();

            // Validaciones básicas
            if (!nombre || !cbu || !alias || !banco) {
                alert('Por favor completa todos los campos.');
                return;
            }

            // Crear objeto contacto y guardarlo en el array/localStorage
            var nuevoContacto = { nombre: nombre, cbu: cbu, alias: alias, banco: banco };
            contactos.push(nuevoContacto);
            localStorage.setItem('walletContacts', JSON.stringify(contactos));

            // Guardar contactos en localStorage
            localStorage.setItem('walletContacts', JSON.stringify(contactos));

            // Volver a renderizar la lista respetando el último filtro aplicado
            renderContactos(ultimoFiltro);

            // Cerrar modal y resetear formulario
            $('#contactModal').hide();
            $('#formContacto')[0].reset();
        });

        // Manejo del formulario de búsqueda: filtrar contactos por nombre o alias
        $('#formBusqueda').submit(function(e) {
            e.preventDefault();
            var termino = $('#searchTerm').val() || '';
            ultimoFiltro = termino;
            renderContactos(ultimoFiltro);
        });

        // Botón para limpiar la búsqueda y mostrar todos los contactos
        $('#btnLimpiarBusqueda').click(function() {
            $('#searchTerm').val('');
            ultimoFiltro = '';
            renderContactos();
        });
    </script>
</body>
</html>
